{% extends "base_admin.html" %}
{% block title %}选择票务选项{% endblock %}
{% block page_title %}选择票务选项{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-header">
            <h5><i class="fa fa-ticket"></i> 选择票务选项</h5>
        </div>
        <div class="card-body">
            <div class="alert alert-info mb-4">
                <i class="fa fa-info-circle"></i> 目的地：{{ dest_name }}
            </div>
            <form method="post">
                <div class="mb-3">
                    <label for="ticket_type" class="form-label">车票类型 <span class="text-danger">*</span></label>
                    <select class="form-select" id="ticket_type" name="ticket_type" required>
                        {% for type in ticket_types %}
                            <option value="{{ type }}">{{ type }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="seat_type" class="form-label">座位类型 <span class="text-danger">*</span></label>
                    <select class="form-select" id="seat_type" name="seat_type" required>
                        {% for type in seat_types %}
                            <option value="{{ type }}">{{ type }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-custom">
                        <i class="fa fa-arrow-right"></i> 下一步
                    </button>
                    <a href="{{ url_for('select_destination') }}" class="btn btn-secondary">
                        <i class="fa fa-arrow-left"></i> 返回选择目的地
                    </a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
