{% extends "base_admin.html" %}
{% block title %}支付{% endblock %}
{% block page_title %}支付{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-header">
            <h5><i class="fa fa-credit-card"></i> 支付</h5>
        </div>
        <div class="card-body">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>目的地：</strong>{{ dest_name }}</p>
                            <p><strong>票种：</strong>{{ ticket_type }}</p>
                            <p><strong>座位：</strong>{{ seat_type }}</p>
                        </div>
                        <div class="col-md-6 text-right">
                            <h3 class="text-primary">应付金额：¥{{ "%.2f"|format(price) }}</h3>
                        </div>
                    </div>
                </div>
            </div>
            <form method="post">
                <div class="mb-3">
                    <label for="payment_method" class="form-label">支付方式 <span class="text-danger">*</span></label>
                    <select class="form-select" id="payment_method" name="payment_method" required>
                        <option value="MCard">MCard</option>
                        <option value="现金">现金</option>
                    </select>
                </div>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-custom">
                        <i class="fa fa-check"></i> 确认支付
                    </button>
                    <a href="{{ url_for('select_options') }}" class="btn btn-secondary">
                        <i class="fa fa-arrow-left"></i> 返回修改
                    </a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
