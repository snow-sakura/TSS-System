{% extends "base_admin.html" %}
{% block title %}{{ '编辑用户' if user else '添加用户' }}{% endblock %}
{% block page_title %}{{ '编辑用户' if user else '添加用户' }}{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-header">
            <h5><i class="fa fa-user"></i> {{ '编辑用户' if user else '添加用户' }}</h5>
        </div>
        <div class="card-body">
            <form method="post">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="username" name="username" 
                                value="{{ user.username if user else '' }}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="email" class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                value="{{ user.email if user else '' }}">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="role" class="form-label">角色</label>
                            <select class="form-select" id="role" name="role">
                                <option value="user" {% if not user or user.role == 'user' %}selected{% endif %}>普通用户</option>
                                <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>管理员</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">状态</label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status" id="status_active" value="1" 
                                        {% if not user or user.status == 1 %}checked{% endif %}>
                                    <label class="form-check-label" for="status_active">启用</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status" id="status_inactive" value="0" 
                                        {% if user and user.status == 0 %}checked{% endif %}>
                                    <label class="form-check-label" for="status_inactive">禁用</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        {% if user %}新密码（留空不修改）{% else %}密码 <span class="text-danger">*</span>{% endif %}
                    </label>
                    <input type="password" class="form-control" id="password" name="password" 
                        placeholder="{{ '请输入新密码' if user else '请输入密码' }}" {% if not user %}required{% endif %}>
                </div>

                {% if not user %}
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">确认密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                        placeholder="请再次输入密码" required>
                </div>
                {% endif %}

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-custom">
                        <i class="fa fa-save"></i> 保存
                    </button>
                    <a href="{{ url_for('users') }}" class="btn btn-secondary">
                        <i class="fa fa-arrow-left"></i> 返回
                    </a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
