{% extends "base_admin.html" %}
{% block title %}首页{% endblock %}
{% block page_title %}首页{% endblock %}

{% block content %}
    <div class="card text-center">
        <div class="card-body">
            <div class="mb-4">
                <i class="fa fa-ticket fa-5x text-primary"></i>
            </div>
            <h1 class="mb-4">欢迎使用 TSS 售票系统</h1>
            <p class="text-muted mb-6">请选择以下操作开始您的旅程</p>
            <form method="post" class="d-flex flex-column gap-3">
                <button type="submit" name="action" value="start" class="btn btn-custom btn-lg">
                    <i class="fa fa-shopping-cart"></i> 开始购票
                </button>
            </form>
            <div class="mt-6 p-4 bg-light rounded">
                <h5 class="mb-3"><i class="fa fa-info-circle"></i> 购票流程</h5>
                <div class="row justify-content-center">
                    <div class="col-md-2 text-center">
                        <div class="bg-primary text-white rounded-full w-12 h-12 flex items-center justify-center mx-auto mb-2">1</div>
                        <div class="text-sm">选择目的地</div>
                    </div>
                    <div class="col-md-1">
                        <i class="fa fa-arrow-right text-muted mt-4"></i>
                    </div>
                    <div class="col-md-2 text-center">
                        <div class="bg-primary text-white rounded-full w-12 h-12 flex items-center justify-center mx-auto mb-2">2</div>
                        <div class="text-sm">选择票种座位</div>
                    </div>
                    <div class="col-md-1">
                        <i class="fa fa-arrow-right text-muted mt-4"></i>
                    </div>
                    <div class="col-md-2 text-center">
                        <div class="bg-primary text-white rounded-full w-12 h-12 flex items-center justify-center mx-auto mb-2">3</div>
                        <div class="text-sm">支付</div>
                    </div>
                    <div class="col-md-1">
                        <i class="fa fa-arrow-right text-muted mt-4"></i>
                    </div>
                    <div class="col-md-2 text-center">
                        <div class="bg-success text-white rounded-full w-12 h-12 flex items-center justify-center mx-auto mb-2">4</div>
                        <div class="text-sm">取票</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
