<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - TSS AI测试平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FEF9F4 0%, #F7EDE4 50%, #FCF3EB 100%);
            padding: 20px;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
        }
        .bg-circle:nth-child(1) {
            width: 400px; height: 400px;
            background: #D4A574;
            top: -100px; right: -100px;
        }
        .bg-circle:nth-child(2) {
            width: 300px; height: 300px;
            background: #E8C9A8;
            bottom: -80px; left: -80px;
        }
        .bg-circle:nth-child(3) {
            width: 200px; height: 200px;
            background: #F4C7AB;
            bottom: 40%; left: 60%;
        }

        /* 登录卡片 - 拍立得风格 */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: #FFFFFF;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(93, 64, 55, 0.12);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        /* 拍立得底部装饰条 */
        .login-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #D4A574, #E8C9A8, #F4C7AB);
        }

        /* 顶部装饰区 */
        .login-header {
            padding: 40px 40px 20px;
            text-align: center;
        }
        .login-logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #FFF8F0, #F7EDE4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #D4A574;
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.2);
        }
        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #5D4037;
            margin-bottom: 6px;
        }
        .login-header p {
            font-size: 14px;
            color: #BCAAA4;
        }

        /* 表单区 */
        .login-body {
            padding: 20px 40px 15px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8D6E63;
            margin-bottom: 6px;
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #BCAAA4;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid #EDE0D4;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            background: #FFFCF8;
            color: #5D4037;
            transition: all 0.25s ease;
        }
        .form-group input::placeholder {
            color: #BCAAA4;
        }
        .form-group input:focus {
            outline: none;
            border-color: #D4A574;
            box-shadow: 0 0 0 4px rgba(212, 165, 116, 0.12);
            background: #FFFFFF;
        }

        /* 验证码行 */
        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .captcha-row input {
            flex: 1;
            padding-left: 14px;
        }
        .captcha-image {
            flex-shrink: 0;
            width: 130px;
            height: 46px;
            border-radius: 10px;
            border: 1.5px solid #EDE0D4;
            cursor: pointer;
            overflow: hidden;
            background: #FFF8F0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
        }
        .captcha-image:hover {
            border-color: #D4A574;
        }
        .captcha-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .captcha-refresh {
            width: 46px;
            height: 46px;
            border: 1.5px solid #EDE0D4;
            border-radius: 10px;
            background: #FFFCF8;
            color: #8D6E63;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .captcha-refresh:hover {
            border-color: #D4A574;
            color: #D4A574;
            background: #FFF8F0;
        }

        /* 记住我 */
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
        }
        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #D4A574;
            cursor: pointer;
        }
        .remember-row label {
            font-size: 13px;
            color: #8D6E63;
            cursor: pointer;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            color: white;
            background: linear-gradient(135deg, #D4A574, #C08D5E);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 165, 116, 0.35);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 底部 */
        .login-footer {
            padding: 15px 40px 35px;
            text-align: center;
        }
        .login-footer .default-account {
            font-size: 12px;
            color: #BCAAA4;
        }
        .login-footer .default-account strong {
            color: #8D6E63;
            font-weight: 500;
        }
        .login-footer .divider {
            margin: 12px auto;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #EDE0D4, transparent);
        }
        .login-footer .copyright {
            font-size: 11px;
            color: #D7CCC8;
        }

        /* 错误提示 */
        .error-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #FFEBEE;
            color: #C62828;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            animation: shake 0.4s ease;
        }

        /* 动画 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-header { padding: 30px 24px 15px; }
            .login-body { padding: 15px 24px; }
            .login-footer { padding: 10px 24px 30px; }
            .captcha-row { flex-wrap: wrap; }
            .captcha-image { width: 100%; height: 50px; }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <!-- 登录卡片 -->
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-camera-retro"></i>
            </div>
            <h1>TSS AI测试平台</h1>
            <p>智能测试 · 温暖体验</p>
        </div>

        <div class="login-body">
            {% if error %}
            <div class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" name="username" 
                               placeholder="请输入用户名" required
                               value="{{ request.form.get('username', '') }}">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" 
                               placeholder="请输入密码" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="captcha">验证码</label>
                    <div class="captcha-row">
                        <input type="text" id="captcha" name="captcha" 
                               placeholder="计算结果" required
                               style="padding-left:14px;">
                        <div class="captcha-image" id="captchaImage" onclick="refreshCaptcha()" title="点击刷新">
                            <img src="/captcha/image" alt="验证码" id="captchaImg">
                        </div>
                        <button type="button" class="captcha-refresh" onclick="refreshCaptcha()" title="刷新验证码">
                            <i class="fas fa-redo"></i>
                        </button>
                    </div>
                </div>

                <div class="remember-row">
                    <input type="checkbox" id="remember" name="remember" value="1">
                    <label for="remember">记住我</label>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <i class="fas fa-arrow-right"></i>
                    登 录
                </button>
            </form>
        </div>

        <div class="login-footer">
            <div class="default-account">
                默认账户 · <strong>admin</strong> / <strong>admin123</strong>
            </div>
            <div class="divider"></div>
            <div class="copyright">© 2026 TSS Platform</div>
        </div>
    </div>

    <script>
    function refreshCaptcha() {
        const img = document.getElementById('captchaImg');
        img.src = '/captcha/image?' + Date.now();
    }

    // 登录表单提交加载状态
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
    });
    </script>
</body>
</html>
