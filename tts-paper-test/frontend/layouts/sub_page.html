{% extends "base.html" %}

{% block content %}
<div class="flex gap-6 -mt-6 -mx-6 min-h-[calc(100vh-60px)]">
    <!-- 左侧子菜单 -->
    <aside class="sub-sidebar" id="subSidebar">
        <div class="sub-sidebar-header">
            <span class="sub-sidebar-title" id="subSidebarTitle">{{ group_title }}</span>
            <button class="sub-sidebar-toggle" onclick="toggleSubSidebar()" title="折叠菜单">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>
        <nav class="sub-sidebar-nav">
            {% for href, icon, label in sub_items %}
            <a href="{{ href }}"
               class="sub-nav-item {% if request.path == href %}active{% endif %}"
               title="{{ label }}">
                <span class="sub-nav-icon"><i class="fas {{ icon }}"></i></span>
                <span class="sub-nav-text">{{ label }}</span>
            </a>
            {% endfor %}
        </nav>
    </aside>

    <!-- 右侧内容 -->
    <div class="sub-content flex-1 min-w-0 py-6 pr-6">
        {% block sub_content %}{% endblock %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleSubSidebar() {
    const sidebar = document.getElementById('subSidebar');
    sidebar.classList.toggle('collapsed');
    localStorage.setItem('sub_sidebar_collapsed', sidebar.classList.contains('collapsed'));
}

document.addEventListener('DOMContentLoaded', function() {
    if (localStorage.getItem('sub_sidebar_collapsed') === 'true') {
        document.getElementById('subSidebar').classList.add('collapsed');
    }
});
</script>

<style>
/* ===== 左侧子菜单 ===== */
.sub-sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #FFFFFF;
    border-right: 1px solid #F5EDE6;
    display: flex;
    flex-direction: column;
    transition: width 0.25s ease;
    overflow: hidden;
}
.sub-sidebar.collapsed {
    width: 60px;
}

.sub-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 16px;
    border-bottom: 1px solid #F5EDE6;
    min-height: 56px;
}
.sub-sidebar-title {
    font-size: 14px;
    font-weight: 600;
    color: #5D4037;
    white-space: nowrap;
    overflow: hidden;
    transition: opacity 0.2s;
}
.sub-sidebar.collapsed .sub-sidebar-title {
    opacity: 0;
    width: 0;
}
.sub-sidebar-toggle {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #BCAAA4;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
}
.sub-sidebar-toggle:hover {
    background: #F7EDE4;
    color: #8D6E63;
}
.sub-sidebar.collapsed .sub-sidebar-toggle {
    transform: rotate(180deg);
}

.sub-sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 10px 8px;
}

.sub-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    color: #8D6E63;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.15s ease;
    margin-bottom: 2px;
    white-space: nowrap;
}
.sub-nav-item:hover {
    background: #FCF3EB;
    color: #5D4037;
}
.sub-nav-item.active {
    background: #D4A574;
    color: #FFFFFF;
    font-weight: 500;
}

.sub-nav-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
}
.sub-nav-text {
    overflow: hidden;
    transition: opacity 0.2s;
}
.sub-sidebar.collapsed .sub-nav-text {
    opacity: 0;
    width: 0;
}
.sub-sidebar.collapsed .sub-nav-item {
    justify-content: center;
    padding: 10px;
}

/* 响应式 */
@media (max-width: 1024px) {
    .sub-sidebar {
        width: 200px;
    }
}

@media (max-width: 768px) {
    .sub-sidebar {
        width: 60px;
    }
    .sub-sidebar .sub-sidebar-title,
    .sub-sidebar .sub-nav-text {
        opacity: 0;
        width: 0;
    }
    .sub-sidebar .sub-nav-item {
        justify-content: center;
        padding: 10px;
    }
    .sub-sidebar .sub-sidebar-toggle {
        transform: rotate(180deg);
    }
}
</style>
{% endblock %}
